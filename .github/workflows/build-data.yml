name: Build data.json

on:
  schedule:
    # Target: every 30 minutes around the clock.
    # GitHub's scheduler doesn't reliably fire comma-list entries (13,43 * * * *)
    # at both times — in practice only one fires per hour. Using separate cron
    # entries is more reliable: each is an independent trigger that GitHub tracks
    # individually, so a missed :13 doesn't prevent the :43 from running.
    # Off-round minutes (:13/:43) are less contended than :00/:30 on GH runners.
    - cron: '13 * * * *'
    - cron: '43 * * * *'
  workflow_dispatch: {}      # lets us trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build data.json
        run: node scripts/build-data.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Update data.json"
          git push
