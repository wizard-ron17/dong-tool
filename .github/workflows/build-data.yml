name: Build data.json

on:
  schedule:
    # Multiple staggered runs instead of one, for two reasons:
    # 1. West coast extra-inning games can finish late, so one early run might miss the last game.
    #    Each later run recomputes the full season fresh, so it self-corrects.
    # 2. GitHub queues scheduled runs and can delay them (worse on round minutes like :00/:30),
    #    so several off-round attempts make it much more likely at least one lands before 8am ET.
    - cron: '13 8 * * *'      # ~4:13am EDT / 1:13am PDT
    - cron: '13 10 * * *'     # ~6:13am EDT / 3:13am PDT
    - cron: '43 11 * * *'     # ~7:43am EDT / 4:43am PDT
    - cron: '17 12 * * *'     # ~8:17am EDT / 5:17am PDT — final safety net
  workflow_dispatch: {}      # lets us trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build data.json
        run: node scripts/build-data.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Update data.json"
          git push
