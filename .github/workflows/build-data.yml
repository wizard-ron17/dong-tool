name: Build data.json

on:
  schedule:
    # Runs every 30 minutes, around the clock. This repo is public, so GitHub
    # Actions minutes are unlimited/free — the cadence is set by usefulness and
    # by being polite to the upstream data sources (MLB Stats API + Baseball
    # Savant), NOT by any billing tier. Each build takes ~1.5 min.
    #
    # Why :13/:43 instead of :00/:30: GitHub delays scheduled runs under load,
    # and round minutes are the most contended, so off-round times land more
    # reliably. Every run recomputes the full season fresh, so a delayed or
    # dropped run just self-corrects on the next one — including catching late
    # west-coast finishes and same-day starters as lineups post through the day.
    - cron: '13,43 * * * *'
  workflow_dispatch: {}      # lets us trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build data.json
        run: node scripts/build-data.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Update data.json"
          git push
