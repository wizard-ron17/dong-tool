name: Build data.json

on:
  schedule:
    - cron: '0 12 * * *'     # once daily, 12:00 UTC (5am PDT / 8am EDT) — after even West coast extra-inning games are final
  workflow_dispatch: {}      # lets us trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build data.json
        run: node scripts/build-data.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Update data.json"
          git push
